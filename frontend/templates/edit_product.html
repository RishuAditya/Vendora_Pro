{% extends "base.html" %} {% block content %}
<div class="container mt-5 animate-page">
  <div class="form-container-premium shadow-lg">
    <h2 class="fw-bold text-center mb-4 text-dark">✏️ Edit Product Details</h2>
    <form method="POST" enctype="multipart/form-data">
      <!-- Title -->
      <div class="mb-4">
        <label class="form-label small fw-bold text-muted text-uppercase"
          >Product Title</label
        >
        <input
          type="text"
          name="name"
          class="form-control form-control-premium"
          value="{{ product.name }}"
          required
        />
      </div>

      <!-- Category & Brand -->
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted text-uppercase"
            >Category</label
          >
          <select
            name="category_id"
            id="catSelect"
            class="form-select form-control-premium"
            required
            onchange="toggleIntelligence()"
          >
            {% for cat in categories %}
            <!-- ✅ Sabse Safe Comparison Logic -->
            {% if cat.id == product.category_id %}
            <option value="{{ cat.id }}" selected>{{ cat.name }}</option>
            {% else %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endif %} {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted text-uppercase"
            >Brand Name</label
          >
          <input
            type="text"
            name="brand"
            class="form-control form-control-premium"
            value="{{ product.brand or '' }}"
            required
          />
        </div>
      </div>

      <!-- Specs Section -->
      <div class="row g-3 mb-4">
        <div class="col-md-6" id="expBox" style="display: none">
          <label class="form-label fw-bold text-danger small text-uppercase"
            >Expiry Date</label
          >
          <input
            type="date"
            name="expiry_date"
            class="form-control form-control-premium border-danger"
            value="{{ product.expiry_date }}"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted text-uppercase"
            >Weight / Quantity</label
          >
          <input
            type="text"
            name="weight_qty"
            class="form-control form-control-premium"
            value="{{ product.weight_qty or '' }}"
          />
        </div>
        <div class="col-md-12">
          <label class="form-label small fw-bold text-muted text-uppercase"
            >Warranty Information</label
          >
          <input
            type="text"
            name="warranty"
            class="form-control form-control-premium"
            value="{{ product.warranty or '' }}"
          />
        </div>
      </div>

      <!-- Price & Stock -->
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted text-uppercase"
            >Price (₹)</label
          >
          <input
            type="number"
            name="price"
            step="0.01"
            class="form-control form-control-premium"
            value="{{ product.price }}"
            required
          />
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted text-uppercase"
            >Stock Units</label
          >
          <input
            type="number"
            name="stock"
            class="form-control form-control-premium"
            value="{{ product.stock }}"
            required
          />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold text-muted text-uppercase"
          >Technical Specifications</label
        >
        <textarea
          name="specifications"
          class="form-control form-control-premium"
          rows="4"
        >
{{ product.specifications or '' }}</textarea
        >
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold text-muted text-uppercase"
          >Short Description</label
        >
        <textarea
          name="description"
          class="form-control form-control-premium"
          rows="2"
          required
        >
{{ product.description }}</textarea
        >
      </div>

      <div class="d-grid gap-2">
        <button
          type="submit"
          class="btn btn-dark btn-lg rounded-pill py-3 fw-bold shadow"
        >
          🚀 Save Product Changes
        </button>
        <a href="/seller/my-products" class="btn btn-link text-muted mt-1"
          >Cancel and Go Back</a
        >
      </div>
    </form>
  </div>
</div>

<script>
  function toggleIntelligence() {
    const sel = document.getElementById("catSelect");
    const txt = sel.options[sel.selectedIndex].text;
    const expBox = document.getElementById("expBox");
    if (expBox) {
      expBox.style.display =
        txt.includes("Grocer") || txt.includes("Food") ? "block" : "none";
    }
  }
  document.addEventListener("DOMContentLoaded", toggleIntelligence);
</script>
{% endblock %}
