{% extends "base.html" %} {% block content %}
<div class="container mt-5 animate-page">
  <div
    class="card glass-card shadow-lg border-0 mx-auto"
    style="max-width: 650px; border-radius: 30px"
  >
    <div class="card-body p-5">
      <h2 class="fw-bold text-center mb-4">🚀 Join Vendora</h2>
      <form method="POST" enctype="multipart/form-data">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">FULL NAME</label>
            <input
              type="text"
              name="name"
              class="form-control form-control-premium"
              placeholder="John Doe"
              required
            />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">CHOOSE ROLE</label>
            <select
              name="role"
              id="roleSelect"
              class="form-select form-control-premium"
              required
              onchange="toggleSellerFields()"
            >
              <option value="customer">🛍️ Customer</option>
              <option value="seller">🏪 Seller</option>
            </select>
          </div>
        </div>

        <div
          id="sellerFields"
          style="display: none"
          class="p-3 bg-light rounded-4 border mb-4"
        >
          <div class="mb-3">
            <label class="form-label small fw-bold text-primary"
              >SHOP NAME</label
            >
            <input
              type="text"
              name="shop_name"
              class="form-control border-2"
              placeholder="e.g. Aditya's Store"
            />
          </div>
          <div class="mb-0">
            <label class="form-label small fw-bold text-primary"
              >SHOP ADDRESS</label
            >
            <textarea
              name="shop_address"
              class="form-control border-2"
              rows="2"
              placeholder="Full shop location..."
            ></textarea>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">EMAIL ADDRESS</label>
            <input
              type="email"
              name="email"
              class="form-control form-control-premium"
              required
            />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">PASSWORD</label>
            <input
              type="password"
              name="password"
              class="form-control form-control-premium"
              required
            />
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">AGE</label>
            <input
              type="number"
              name="age"
              class="form-control form-control-premium"
              required
            />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label small fw-bold">GENDER</label>
            <select name="gender" class="form-select form-control-premium">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">PERSONAL ADDRESS</label>
          <textarea
            name="address"
            class="form-control form-control-premium"
            rows="2"
            required
          ></textarea>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">PROFILE PHOTO</label>
          <input
            type="file"
            name="profile_pic"
            class="form-control form-control-premium"
            accept="image/*"
          />
        </div>

        <button
          type="submit"
          class="btn btn-dark btn-lg w-100 rounded-pill py-3 fw-bold shadow"
        >
          Create Account ✨
        </button>
      </form>
    </div>
  </div>
</div>
<script>
  function toggleSellerFields() {
    const role = document.getElementById("roleSelect").value;
    document.getElementById("sellerFields").style.display =
      role === "seller" ? "block" : "none";
  }
</script>
{% endblock %}
