{% extends "base.html" %} {% block content %}
<div
  class="container d-flex justify-content-center align-items-center vh-100 animate-page"
>
  <div
    class="card glass-card hover-lift shadow-lg p-4 border-0"
    style="width: 450px; border-radius: 25px"
  >
    <div class="text-center mb-4">
      <div class="fs-1 mb-2">🚀</div>
      <h2 class="fw-bold text-dark">Join Vendora Pro</h2>
      <p class="text-muted small">
        Start your journey as a buyer or seller today
      </p>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">Full Name</label>
        <input
          type="text"
          name="name"
          class="form-control"
          placeholder="John Doe"
          required
        />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary"
          >Email Address</label
        >
        <input
          type="email"
          name="email"
          class="form-control"
          placeholder="john@example.com"
          required
        />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary"
          >Create Password</label
        >
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="••••••••"
          required
        />
      </div>
      <div class="mb-4">
        <label class="form-label small fw-bold text-secondary"
          >Select Your Role</label
        >
        <select name="role" class="form-select form-control" required>
          <option value="" disabled selected>Who are you?</option>
          <option value="customer">🛍️ Customer (Buyer)</option>
          <option value="seller">🏪 Seller (Vendor)</option>
        </select>
      </div>

      <button
        type="submit"
        class="btn btn-cool w-100 py-3 rounded-pill shadow-sm"
      >
        Create Account ✨
      </button>

      <div class="text-center mt-4">
        <span class="text-muted small"
          >Already a member?
          <a href="/login" class="text-info fw-bold text-decoration-none"
            >Login Now</a
          >
        </span>
      </div>
    </form>
  </div>
</div>
{% endblock %}
