{% extends "base.html" %} {% block content %}
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>📋 My Inventory</h3>
    <a href="/seller/add-product" class="btn btn-success">+ Add New</a>
  </div>

  <div class="card glass-card shadow-sm border-0 p-3">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Image</th>
          <th>Product Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        {% for product in products %}
        <tr>
          <td>
            <img
              src="{{ url_for('static', filename='images/products/' + product.image) if product.image else 'https://via.placeholder.com/50' }}"
              class="rounded shadow-sm"
              width="50"
              height="50"
            />
          </td>
          <td class="align-middle fw-bold">{{ product.name }}</td>
          <td class="align-middle text-success">₹{{ product.price }}</td>
          <td class="align-middle">{{ product.stock }} pcs</td>
          <td class="align-middle">
            <span
              class="badge {{ 'bg-success' if product.stock > 0 else 'bg-danger' }}"
            >
              {{ 'In Stock' if product.stock > 0 else 'Out of Stock' }}
            </span>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
